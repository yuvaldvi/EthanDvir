# Build settings — no build step needed; pure static HTML/CSS/JS.
[build]
  publish = "."

# Custom headers — caching + light security defaults
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long cache for image assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Shorter cache for HTML (so updates show up quickly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Pretty URLs: /career → /career.html
[[redirects]]
  from = "/career"
  to = "/career.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/partner"
  to = "/partner.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200
